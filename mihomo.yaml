# Converted from sing-box config on 2026-04-12.
# Goal: behavior parity with original sing-box rules/rule-set tags.

mixed-port: 8088
allow-lan: false
mode: rule
log-level: info
ipv6: false
find-process-mode: strict

profile:
  store-selected: true
  store-fake-ip: true

tun:
  enable: true
  stack: mixed
  auto-route: true
  auto-detect-interface: true
  strict-route: true
  inet4-address:
    - 172.19.0.1/30
  dns-hijack:
    - any:53
    - tcp://any:53
  exclude-package:
    - ru.rostel
    - ru.oneme.app

dns:
  enable: true
  ipv6: false
  enhanced-mode: redir-host
  use-hosts: true
  respect-rules: true
  nameserver:
    - '1.1.1.1#disable-qtype-64&disable-qtype-65&disable-ipv6'
    - 'system://#disable-qtype-64&disable-qtype-65&disable-ipv6'
  proxy-server-nameserver:
    - '1.1.1.1#disable-qtype-64&disable-qtype-65&disable-ipv6'
  direct-nameserver:
    - 'system://#disable-qtype-64&disable-qtype-65&disable-ipv6'
  direct-nameserver-follow-policy: true
  nameserver-policy:
    'rule-set:encrypted-dns':
      - rcode://refused
    'rule-set:android-fcm':
      - 'system://#disable-qtype-64&disable-qtype-65&disable-ipv6'
    'rule-set:itdog-russia-inside':
      - '1.1.1.1#disable-qtype-64&disable-qtype-65&disable-ipv6'
    'rule-set:bypass-domains':
      - 'system://#disable-qtype-64&disable-qtype-65&disable-ipv6'

sniffer:
  enable: true
  parse-pure-ip: true
  force-dns-mapping: true
  sniff:
    HTTP:
      ports: [80, 8080-8880]
    TLS:
      ports: [443, 8443]

proxies:
  - name: seiko
    type: trojan
    server: lastfaf.space
    port: 443
    password: nd0MAvOZ6nGkfWe2M3FkvrhwV
    udp: true
    sni: lastfaf.space
    smux:
      enabled: true
      max-connections: 6
      padding: true

  - name: aeza
    type: trojan
    server: data.s-backup.online
    port: 443
    password: nd0MAvOZ6nGkfWe2M3FkvrhwV
    udp: true
    sni: data.s-backup.online
    smux:
      enabled: true
      max-connections: 6
      padding: true

proxy-groups:
  - name: select
    type: select
    proxies:
      - auto
      - seiko
      - aeza

  - name: auto
    type: url-test
    proxies:
      - seiko
      - aeza
    url: https://cp.cloudflare.com/generate_204
    interval: 300

rule-providers:
  encrypted-dns:
    type: file
    behavior: classical
    path: ./rules/providers/encrypted-dns.yaml

  bypass-domains:
    type: file
    behavior: classical
    path: ./rules/providers/bypass-domains.yaml

  bypass-ips:
    type: file
    behavior: classical
    path: ./rules/providers/bypass-ips.yaml

  itdog-russia-inside:
    type: file
    behavior: classical
    path: ./rules/providers/itdog-russia-inside.yaml

  android-fcm:
    type: file
    behavior: classical
    path: ./rules/providers/android-fcm.yaml

  bypass-apps:
    type: file
    behavior: classical
    path: ./rules/providers/bypass-apps.yaml

rules:
  - RULE-SET,bypass-apps,DIRECT

  - DOMAIN,localhost,DIRECT
  - DOMAIN-SUFFIX,local,DIRECT

  - IP-CIDR,10.0.0.0/8,DIRECT,no-resolve
  - IP-CIDR,100.64.0.0/10,DIRECT,no-resolve
  - IP-CIDR,127.0.0.0/8,DIRECT,no-resolve
  - IP-CIDR,169.254.0.0/16,DIRECT,no-resolve
  - IP-CIDR,172.16.0.0/12,DIRECT,no-resolve
  - IP-CIDR,192.168.0.0/16,DIRECT,no-resolve
  - IP-CIDR,224.0.0.0/4,DIRECT,no-resolve
  - IP-CIDR,240.0.0.0/4,DIRECT,no-resolve
  - IP-CIDR6,::1/128,DIRECT,no-resolve
  - IP-CIDR6,fc00::/7,DIRECT,no-resolve
  - IP-CIDR6,fe80::/10,DIRECT,no-resolve

  - AND,((NETWORK,UDP),(DST-PORT,443)),REJECT
  - RULE-SET,encrypted-dns,REJECT

  - RULE-SET,android-fcm,DIRECT
  - RULE-SET,itdog-russia-inside,select
  - RULE-SET,bypass-domains,DIRECT
  - RULE-SET,bypass-ips,DIRECT,no-resolve

  - MATCH,select
