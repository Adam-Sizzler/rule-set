name: Merge itdoginfo rule-sets

on:
  schedule:
    - cron: "43 09 * * *"
  workflow_dispatch:
  push:
    paths:
      - .github/workflows/merge-itdog-rule-sets.yml

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  JSON_DIR: json
  SRS_DIR: srs
  MRS_DIR: mrs
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

defaults:
  run:
    shell: bash --noprofile --norc -euo pipefail {0}

jobs:
  decompile:
    name: Decompile ${{ matrix.service }}
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    strategy:
      fail-fast: false
      max-parallel: 6
      matrix:
        service:
          - telegram
          - cloudflare
          - hetzner
          - ovh
          - digitalocean
          - cloudfront
          - roblox
          - google_ai
          - google_play
          - google_meet
          - hodca
          - discord
          - twitter
          - meta
          - russia_inside

    steps:
      - name: Download ${{ matrix.service }}.srs
        env:
          DOWNLOAD_URL: https://github.com/itdoginfo/allow-domains/releases/latest/download
        run: |
          mkdir -p "${{ env.SRS_DIR }}" "${{ env.JSON_DIR }}"
          url="${DOWNLOAD_URL}/${{ matrix.service }}.srs"
          out="${{ env.SRS_DIR }}/${{ matrix.service }}.srs"

          curl -fsSL \
            --retry 5 --retry-delay 2 --retry-all-errors \
            --connect-timeout 10 --max-time 120 \
            -o "$out" "$url"

          test -s "$out"

      - name: Decompile to JSON (source format)
        uses: docker://ghcr.io/sagernet/sing-box:v1.12.17
        with:
          args: >-
            rule-set decompile
            ${{ env.SRS_DIR }}/${{ matrix.service }}.srs
            -o
            ${{ env.JSON_DIR }}/${{ matrix.service }}.json

      - name: Validate decompiled JSON
        run: |
          test -s "${{ env.JSON_DIR }}/${{ matrix.service }}.json"
          python3 -m json.tool "${{ env.JSON_DIR }}/${{ matrix.service }}.json" >/dev/null

      - name: Upload decompiled JSON
        uses: actions/upload-artifact@v4
        with:
          name: decompiled-${{ matrix.service }}
          path: ${{ env.JSON_DIR }}/${{ matrix.service }}.json
          if-no-files-found: error
          retention-days: 1

  merge_compile_commit:
    name: Merge + compile + commit
    if: ${{ always() && !cancelled() }}
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    needs: decompile
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download all JSON artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: decompiled-*
          path: decompiled-rule-sets
          merge-multiple: true

      - name: Prepare output directories
        run: |
          mkdir -p "${{ env.JSON_DIR }}" "${{ env.SRS_DIR }}" "${{ env.MRS_DIR }}" decompiled-rule-sets-flat
          find decompiled-rule-sets -type f -name '*.json' -print0 | while IFS= read -r -d '' f; do
            cp "$f" "decompiled-rule-sets-flat/$(basename "$f")"
          done

      - name: List JSON artifacts that will be merged
        run: |
          ls -1 decompiled-rule-sets-flat/*.json

      - name: Merge to itdog-combined.json
        uses: docker://ghcr.io/sagernet/sing-box:v1.12.17
        with:
          args: >-
            rule-set merge
            ${{ env.JSON_DIR }}/itdog-combined.json
            -C decompiled-rule-sets-flat

      - name: Validate combined JSON
        run: |
          test -s "${{ env.JSON_DIR }}/itdog-combined.json"
          python3 -m json.tool "${{ env.JSON_DIR }}/itdog-combined.json" >/dev/null

      - name: Compile to itdog-combined.srs
        uses: docker://ghcr.io/sagernet/sing-box:v1.12.17
        with:
          args: >-
            rule-set compile
            ${{ env.JSON_DIR }}/itdog-combined.json
            -o
            ${{ env.SRS_DIR }}/itdog-combined.srs

      - name: Ensure combined SRS exists and is non-empty
        run: |
          test -s "${{ env.SRS_DIR }}/itdog-combined.srs"

      - name: Generate MRS (domain + ipcidr)
        run: |
          rm -f "${{ env.MRS_DIR }}/itdog-combined.yaml" \
                "${{ env.MRS_DIR }}/itdog-combined-domain.mrs" \
                "${{ env.MRS_DIR }}/itdog-combined-ipcidr.mrs"

          domain_src="$(mktemp)"
          ipcidr_src="$(mktemp)"

          {
            echo "payload:"
            jq -r '
              def toarr: if . == null then [] elif (type=="array") then . else [.] end;
              (
                [.. | objects | .domain? | select(.) | toarr[]] +
                [.. | objects | .domain_suffix? | select(.) | toarr[] | "+." + ltrimstr(".")]
              )
              | unique[]
            ' "${{ env.JSON_DIR }}/itdog-combined.json" | sed 's/^/- /'
          } > "$domain_src"

          {
            echo "payload:"
            jq -r '
              def toarr: if . == null then [] elif (type=="array") then . else [.] end;
              [.. | objects | .ip_cidr? | select(.) | toarr[] |
               (tostring |
                if test("/") then .
                elif test(":") then . + "/128"
                else . + "/32"
                end)]
              | unique[]
            ' "${{ env.JSON_DIR }}/itdog-combined.json" | sed 's/^/- /'
          } > "$ipcidr_src"

          curl -fsSL "https://github.com/MetaCubeX/mihomo/releases/download/v1.19.23/mihomo-linux-amd64-compatible-v1.19.23.gz" \
            | gzip -dc > ./mihomo
          chmod +x ./mihomo

          ./mihomo convert-ruleset domain yaml "$domain_src" "${{ env.MRS_DIR }}/itdog-combined-domain.mrs"
          ./mihomo convert-ruleset ipcidr yaml "$ipcidr_src" "${{ env.MRS_DIR }}/itdog-combined-ipcidr.mrs"

          rm -f ./mihomo "$domain_src" "$ipcidr_src"

      - name: Ensure generated MRS files exist
        run: |
          test -s "${{ env.MRS_DIR }}/itdog-combined-domain.mrs"
          test -s "${{ env.MRS_DIR }}/itdog-combined-ipcidr.mrs"

      - name: Commit & push (only if changed)
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add -A "${{ env.JSON_DIR }}" "${{ env.SRS_DIR }}" "${{ env.MRS_DIR }}"

          if git diff --cached --quiet; then
            echo "No changes, skipping commit."
            exit 0
          fi

          git commit -m "chore: update itdog combined rule-set"
          git push

