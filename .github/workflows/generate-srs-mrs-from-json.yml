name: Generate SRS, MRS and YAML from JSON

on:
  schedule:
    - cron: "0 3 */3 * *"
  workflow_dispatch:
  push:
    paths:
      - "json/*.json"
      - "srs/*.srs"
      - "mrs/*.mrs"
      - "mrs/*.yaml"
      - "README.md"
      - "scripts/generate-readme.py"
      - "scripts/singbox-json-to-mihomo-yaml.py"
      - ".github/workflows/generate-srs-mrs-from-json.yml"

concurrency:
  group: ruleset-write-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

defaults:
  run:
    shell: bash --noprofile --norc -euo pipefail {0}

jobs:
  generate:
    runs-on: ubuntu-24.04
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y curl jq
          bash <(curl -fsSL https://sing-box.app/deb-install.sh)
          curl -fsSL "https://github.com/MetaCubeX/mihomo/releases/download/v1.19.23/mihomo-linux-amd64-compatible-v1.19.23.gz" \
            | gzip -dc > ./mihomo
          sudo mv ./mihomo /usr/local/bin/mihomo
          sudo chmod +x /usr/local/bin/mihomo

      - name: Generate srs, mrs and yaml from existing json files
        run: |
          mkdir -p json srs mrs
          find srs -maxdepth 1 -type f -name '*.srs' -delete
          find mrs -maxdepth 1 -type f -name '*.yaml' -delete
          find mrs -maxdepth 1 -type f -name '*.mrs' -delete

          shopt -s nullglob
          json_files=(json/*.json)
          if [ "${#json_files[@]}" -eq 0 ]; then
            echo "No json files found in json/ directory."
            exit 0
          fi

          for json_file in "${json_files[@]}"; do
            name="$(basename "$json_file" .json)"
            srs_out="srs/${name}.srs"
            domain_mrs_out="mrs/${name}-domain.mrs"
            ipcidr_mrs_out="mrs/${name}-ipcidr.mrs"
            yaml_out="mrs/${name}.yaml"
            domain_src="$(mktemp)"
            ipcidr_src="$(mktemp)"

            sing-box rule-set compile "$json_file" -o "$srs_out"
            test -s "$srs_out"

            {
              echo "payload:"
              jq -r '
                def toarr: if . == null then [] elif (type=="array") then . else [.] end;
                (
                  [.. | objects | .domain? | select(.) | toarr[]] +
                  [.. | objects | .domain_suffix? | select(.) | toarr[] | "+." + ltrimstr(".")]
                )
                | unique[]
              ' "$json_file" | sed 's/^/- /'
            } > "$domain_src"

            {
              echo "payload:"
              jq -r '
                def toarr: if . == null then [] elif (type=="array") then . else [.] end;
                [.. | objects | .ip_cidr? | select(.) | toarr[] |
                 (tostring |
                  if test("/") then .
                  elif test(":") then . + "/128"
                  else . + "/32"
                  end)]
                | unique[]
              ' "$json_file" | sed 's/^/- /'
            } > "$ipcidr_src"

            domain_count="$(grep -c '^- ' "$domain_src" || true)"
            ipcidr_count="$(grep -c '^- ' "$ipcidr_src" || true)"
            classical_count="$(jq -r '
              def toarr: if . == null then [] elif (type=="array") then . else [.] end;
              [
                .. | objects |
                (.process_name? // empty),
                (.process_name_regex? // empty),
                (.process_path? // empty),
                (.process_path_regex? // empty),
                (.package_name? // empty)
              ] | map(toarr[]) | length
            ' "$json_file")"

            if python3 scripts/singbox-json-to-mihomo-yaml.py "$json_file" "$yaml_out"; then
              test -s "$yaml_out"
            else
              rm -f "$yaml_out"
              echo "Skipped Mihomo YAML for ${json_file}: unsupported sing-box rule semantics"
            fi

            if [ "$classical_count" -gt 0 ]; then
              echo "Skipped MRS for ${json_file}: Mihomo MRS supports only domain/ipcidr, use ${yaml_out}"
            elif [ "$domain_count" -gt 0 ]; then
              mihomo convert-ruleset domain yaml "$domain_src" "$domain_mrs_out"
              test -s "$domain_mrs_out"
            else
              echo "Skipped domain MRS for ${json_file}: no domain/domain_suffix rules"
            fi

            if [ "$classical_count" -eq 0 ] && [ "$ipcidr_count" -gt 0 ]; then
              mihomo convert-ruleset ipcidr yaml "$ipcidr_src" "$ipcidr_mrs_out"
              test -s "$ipcidr_mrs_out"
            elif [ "$classical_count" -gt 0 ]; then
              true
            else
              echo "Skipped ipcidr MRS for ${json_file}: no ip_cidr rules"
            fi

            rm -f "$domain_src" "$ipcidr_src"
            echo "Generated: $json_file -> $srs_out"
          done

          python3 scripts/generate-readme.py

      - name: Show generated files
        run: |
          ls -lah srs
          ls -lah mrs

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add -A srs mrs README.md

          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          git commit -m "chore: regenerate srs and mrs from json"

          for attempt in 1 2 3; do
            if git push origin "HEAD:${GITHUB_REF_NAME}"; then
              exit 0
            fi
            echo "Push rejected (attempt ${attempt}), rebasing onto origin/${GITHUB_REF_NAME}..."
            git fetch origin "${GITHUB_REF_NAME}"
            git rebase "origin/${GITHUB_REF_NAME}"
          done

          echo "Failed to push after 3 attempts."
          exit 1
