hosts:
  example.com: 1.1.1.1
  data.example.com: 2.2.2.2
  portal.example.com: 3.3.3.3
  store.example.com: 4.4.4.4

dns:
  enable: true
  prefer-h3: false
  ipv6: false
  respect-rules: true
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  fake-ip-filter:
    - rule-set:geosite-private

  default-nameserver:
    - https://1.1.1.1/dns-query#DIRECT
    - https://8.8.8.8/dns-query#DIRECT
  nameserver:
    - 1.1.1.1#Proxy
    - 8.8.8.8#Proxy
  proxy-server-nameserver:
    - https://1.1.1.1/dns-query#DIRECT
    - https://8.8.8.8/dns-query#DIRECT
  direct-nameserver:
    - https://1.1.1.1/dns-query#DIRECT
    - https://8.8.8.8/dns-query#DIRECT
    - https://77.88.8.8/dns-query#DIRECT
    - system

  direct-nameserver-follow-policy: false
  nameserver-policy:
    rule-set:geosite-private:
      - system
    rule-set:adlist-geosite,winspy-geosite,category-ads-all:
      - rcode://refused

proxies:

proxy-groups:
#  - name: ⚡️ Auto
#    type: fallback
#    hidden: true
#    url: https://cp.cloudflare.com/generate_204
#    interval: 300
#    proxies:

  - name: ⚡️ Auto
    type: url-test
    hidden: true
    url: https://cp.cloudflare.com/generate_204
    interval: 300
    tolerance: 30
    proxies:

  - name: Proxy
    type: select
    icon: https://cdn.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/Hijacking.png
    proxies:
      - ⚡️ Auto

  - name: 🔓 Без Proxy
    type: select
    hidden: true
    exodus:
      include-proxies: false
    proxies: [DIRECT]

  - name: Games
    type: select
    icon: https://cdn.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/Game.png
    exodus:
      include-proxies: false
    proxies: [🔓 Без Proxy,Proxy]

  - name: Torrent
    type: select
    hidden: true
    icon: https://cdn.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/Cloudflare.png
    exodus:
      include-proxies: false
    proxies: [🔓 Без Proxy,Proxy]

# Правила маршрутизации
rule-anchors:
  ip: &ipcidr { type: http, behavior: ipcidr, format: mrs, interval: 86400, proxy: ⚡️ Auto }
  domain: &domain { type: http, behavior: domain, format: mrs, interval: 86400, proxy: ⚡️ Auto }
  ip-text: &ipcidr-text { type: http, behavior: ipcidr, format: text, interval: 86400, proxy: ⚡️ Auto }
  classical: &classical { type: http, behavior: classical, format: text, interval: 86400, proxy: ⚡️ Auto }
  classical-yaml: &classical-yaml { type: http, behavior: classical, format: yaml, interval: 86400, proxy: ⚡️ Auto }
  inline: &inline { type: inline, behavior: classical }

rule-providers:

  # Локальная сеть
  geosite-private: { <<: *domain, url: https://cdn.jsdelivr.net/gh/hydraponique/roscomvpn-geosite/release/mihomo/private.mrs }
  geoip-private: {<<: *ipcidr, url: https://cdn.jsdelivr.net/gh/hydraponique/roscomvpn-geoip/release/mihomo/private.mrs }

  # Торрент приложения
  torrent-clients: { <<: *classical-yaml, url: https://cdn.jsdelivr.net/gh/Adam-Sizzler/rule-set@main/yaml/torrent-clients.yaml }

  # Российские приложения
  bypass-apps: { <<: *classical-yaml, url: https://cdn.jsdelivr.net/gh/Adam-Sizzler/rule-set@main/yaml/bypass-apps.yaml }
  
  # Игровые сервисы
  steam-geosite: { <<: *domain, url: https://github.com/MetaCubeX/meta-rules-dat/raw/meta/geo/geosite/steam.mrs }
  origin-geosite: { <<: *domain, url: https://github.com/MetaCubeX/meta-rules-dat/raw/meta/geo/geosite/origin.mrs }
  ea-geosite: { <<: *domain, url: https://github.com/MetaCubeX/meta-rules-dat/raw/meta/geo/geosite/ea.mrs }
  epicgames-geosite: { <<: *domain, url: https://github.com/MetaCubeX/meta-rules-dat/raw/meta/geo/geosite/epicgames.mrs }
  games: { <<: *classical-yaml, url: https://cdn.jsdelivr.net/gh/Adam-Sizzler/rule-set@main/yaml/games.yaml }

  # Защищенные DNS
  encrypted-dns-ip: {<<: *ipcidr, url: https://cdn.jsdelivr.net/gh/Adam-Sizzler/rule-set@main/mrs/encrypted-dns-ipcidr.mrs }
  encrypted-dns-domain: { <<: *domain, url: https://cdn.jsdelivr.net/gh/Adam-Sizzler/rule-set@main/mrs/encrypted-dns-domain.mrs }
  
  # Андроид уведомления
  android-fcm-domain: { <<: *domain, url: https://cdn.jsdelivr.net/gh/Adam-Sizzler/sb-rule-set@main/mrs/android-fcm-domain.mrs }
  
  # RU зона
  bypass-domains: { <<: *domain, url: https://cdn.jsdelivr.net/gh/Adam-Sizzler/sb-rule-set@main/mrs/bypass-domains-domain.mrs }
  geosite-ru: { <<: *domain, url: https://cdn.jsdelivr.net/gh/hydraponique/roscomvpn-geosite/release/mihomo/category-ru.mrs }
  geosite-whitelist: { <<: *domain, url: https://cdn.jsdelivr.net/gh/hydraponique/roscomvpn-geosite/release/mihomo/whitelist.mrs }
  geoip-ru: { <<: *ipcidr, url: https://cdn.jsdelivr.net/gh/hydraponique/roscomvpn-geoip/release/mihomo/direct.mrs }
  geoip-kz: { <<: *ipcidr, url: https://github.com/MetaCubeX/meta-rules-dat/raw/meta/geo/geoip/kz.mrs }
  
  # Реклама
  adlist-geosite: { <<: *domain, url: https://github.com/zxc-rv/ad-filter/releases/latest/download/adlist.mrs }
  winspy-geosite: { <<: *domain, url: https://cdn.jsdelivr.net/gh/hydraponique/roscomvpn-geosite/release/mihomo/win-spy.mrs }
  category-ads-all: { <<: *domain, url: https://cdn.jsdelivr.net/gh/Adam-Sizzler/rule-set@main/mrs/geosite-category-ads-all-domain.mrs }

  # Выборочные сервисы
  apple-geosite: { <<: *domain, url: https://cdn.jsdelivr.net/gh/hydraponique/roscomvpn-geosite/release/mihomo/apple.mrs }
  microsoft-geosite: { <<: *domain, url: https://cdn.jsdelivr.net/gh/hydraponique/roscomvpn-geosite/release/mihomo/microsoft.mrs }
  twitchads-geosite: { <<: *domain, url: https://cdn.jsdelivr.net/gh/hydraponique/roscomvpn-geosite/release/mihomo/twitch-ads.mrs }
  twitch-geosite: { <<: *domain, url: https://cdn.jsdelivr.net/gh/hydraponique/roscomvpn-geosite/release/mihomo/twitch.mrs }
  tiktok-geosite: { <<: *domain, url: https://cdn.jsdelivr.net/gh/Adam-Sizzler/rule-set@main/mrs/tiktok-domain.mrs }
  

  # Ручные списки в DIRECT
  direct-inline:
    type: inline
    behavior: classical
    payload: # Типы правил: https://wiki.metacubex.one/ru/config/rules/
      - DOMAIN-SUFFIX,kz
      - DOMAIN-SUFFIX,2ip.io # Мусорный сервис сотрудничащий с РФ
      - DOMAIN-SUFFIX,stackb.net
      - DOMAIN-KEYWORD,porno
  
  # Ручные списки в Proxy
  proxy-inline:
    type: inline
    behavior: classical
    payload: # Типы правил: https://wiki.metacubex.one/ru/config/rules/
      - DOMAIN-KEYWORD,rezka # Rezka.ag и любые ее проявления
      - DOMAIN-KEYWORD,voidboost # Rezka.ag CDN сервера с фильмами

# Правила
rules:
  # Блокировка приложений Android (пример)
  - PROCESS-NAME,com.hybridparking.game,REJECT-DROP

  # Локальная сеть в DIRECT
  - OR,((RULE-SET,geosite-private),(RULE-SET,geoip-private,no-resolve)),DIRECT

  # Реклама REJECT
  - OR,((RULE-SET,adlist-geosite),(RULE-SET,category-ads-all),(RULE-SET,winspy-geosite)),REJECT

  # Скам в директ Windows
  - OR,((PROCESS-NAME,max.exe),(PROCESS-NAME,max-service.exe),(PROCESS-NAME,crashpad_handler.exe)),DIRECT
  - OR,(PROCESS-NAME,Code.exe),DIRECT

  # Torrents в DIRECT
  - RULE-SET,torrent-clients,Torrent
  
  # Games
  - RULE-SET,games,Games
  - RULE-SET,epicgames-geosite,DIRECT
  - OR,((PROCESS-NAME-REGEX,(?i).*steam.*),(RULE-SET,steam-geosite)),DIRECT
  - OR,((RULE-SET,origin-geosite),(RULE-SET,ea-geosite)),DIRECT
  
  # Зашифрованные ДНС
  - RULE-SET,encrypted-dns-domain,REJECT
  - RULE-SET,encrypted-dns-ip,REJECT
  
  # Блокировка QUIC
  - AND,((NETWORK,UDP),(DST-PORT,443)),REJECT
  - 'AND,((NETWORK,udp),(DOMAIN-REGEX,(?i:stun|turn))),REJECT'

  # Ручные списки в Proxy
  - RULE-SET,proxy-inline,Proxy
  
  # Ручные списки в DIRECT
  - RULE-SET,direct-inline,DIRECT
  
  # Выборочные сервисы в PROXY
  - RULE-SET,twitchads-geosite,Proxy # По умолчанию в PROXY (Фикс высокого качества)

  # Выборочные сервисы в DIRECT
  - RULE-SET,android-fcm-domain,DIRECT
  - RULE-SET,apple-geosite,DIRECT
  - RULE-SET,microsoft-geosite,DIRECT
  - RULE-SET,twitch-geosite,DIRECT
  - RULE-SET,tiktok-geosite,DIRECT

  # Уведомления Андроид и российские домены в DIRECT
  - RULE-SET,bypass-domains,DIRECT
  - OR,((RULE-SET,bypass-domains),(RULE-SET,geosite-ru),(RULE-SET,geosite-whitelist),(RULE-SET,geoip-ru),(RULE-SET,geoip-kz)),DIRECT

  # Все остальное в PROXY
  - MATCH,Proxy
